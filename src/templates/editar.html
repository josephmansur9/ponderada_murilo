{% extends "base.html" %}
{% block content %}
    <h1>Editar Leitura #{{ leitura.id }}</h1>
    <form id="editForm">
        <label>Temperatura (°C):</label>
        <input type="number" step="0.01" id="temp" value="{{ leitura.temperatura }}" required><br><br>
        
        <label>Umidade (%):</label>
        <input type="number" step="0.01" id="umid" value="{{ leitura.umidade }}" required><br><br>
        
        <label>Pressão (hPa):</label>
        <input type="number" step="0.01" id="pressao" value="{{ leitura.pressao }}"><br><br>
        <button type="submit">Salvar Alterações</button>
        <a href="/leituras">Cancelar</a>
    </form>

    <script>
        document.getElementById('editForm').onsubmit = async (e) => {
            e.preventDefault();
            const response = await fetch('/leituras/{{ leitura.id }}', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    temperatura: document.getElementById('temp').value,
                    umidade: document.getElementById('umid').value,
                    pressao: document.getElementById('pressao').value
                })
            });
            if (response.ok) {
                alert('Atualizado com sucesso!');
                window.location.href = '/leituras';
            }
        };
    </script>
{% endblock %}
